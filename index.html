<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRDO – AGCO Mogi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Estilos simplificados para o seu dashboard */
        body { font-family: sans-serif; background: #F2F3F5; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .upload-btn { background: #C8102E; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .card { background: #fff; padding: 20px; margin-top: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>

<div class="header">
    <h1>INDICADOR DE PRDO</h1>
    <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none" onchange="onUpload(event)">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">ATUALIZAR PLANILHA</button>
</div>

<div id="dashboardContent">
    <div class="card">
        <p>Aguardando upload de dados ou carregando memória...</p>
    </div>
</div>

<script>
// FUNÇÃO ÚNICA PARA RENDERIZAR
function renderDashboard(data) {
    const container = document.getElementById('dashboardContent');
    if (!data || data.length === 0) return;

    let html = `<div class="card"><h3>Dados Atualizados</h3><table><thead><tr>`;
    // Cabeçalho
    html += Object.keys(data[0]).map(key => `<th>${key}</th>`).join('');
    html += `</tr></thead><tbody>`;
    // Linhas (mostrando as primeiras 15)
    data.slice(0, 15).forEach(row => {
        html += `<tr>${Object.values(row).map(val => `<td>${val}</td>`).join('')}</tr>`;
    });
    html += `</tbody></table></div>`;
    
    container.innerHTML = html;
}

// FUNÇÃO ÚNICA DE UPLOAD (COM SALVAMENTO)
function onUpload(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(sheet);

        // SALVA NO NAVEGADOR
        localStorage.setItem('meusDadosPRDO', JSON.stringify(jsonData));
        
        // MOSTRA NA TELA
        renderDashboard(jsonData);
        alert("Dashboard atualizado e salvo com sucesso!");
    };
    reader.readAsArrayBuffer(file);
}

// AO CARREGAR A PÁGINA, BUSCA O QUE ESTÁ SALVO
window.onload = function() {
    const salvos = localStorage.getItem('meusDadosPRDO');
    if (salvos) {
        renderDashboard(JSON.parse(salvos));
    }
};
</script>
</body>
</html>
